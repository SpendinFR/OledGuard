name: Build OledGuard native Windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        shell: pwsh
        run: dotnet restore .\src\OledGuard\OledGuard.csproj

      - name: Publish portable Windows executable
        shell: pwsh
        run: |
          dotnet publish .\src\OledGuard\OledGuard.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            --no-restore `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:PublishTrimmed=false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o .\dist\OledGuard

          Get-FileHash .\dist\OledGuard\OledGuard.exe -Algorithm SHA256 |
            ForEach-Object { "{0}  OledGuard.exe" -f $_.Hash.ToLowerInvariant() } |
            Set-Content .\dist\OledGuard\SHA256.txt -Encoding ascii

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: OledGuard-native-win-x64
          path: dist/OledGuard/**
          if-no-files-found: error
          retention-days: 14